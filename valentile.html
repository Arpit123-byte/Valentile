<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Will You Be My Valentine?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6c1,#ffe4e1);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.container{
    text-align:center;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
    width:90%;
    max-width:400px;
    position:relative;
}

h1{
    color:#ff4081;
    margin-bottom:20px;
}

.bear{
    font-size:90px;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

.buttons{
    margin-top:25px;
    position:relative;
    height:100px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

#yesBtn{
    background:#ff4081;
    color:white;
    margin-right:10px;
}

#yesBtn:hover{
    transform:scale(1.1);
}

#noBtn{
    background:#555;
    color:white;
    position:absolute;
}

#message{
    margin-top:20px;
    font-size:22px;
    color:#ff4081;
    font-weight:bold;
}

.hug{
    font-size:100px;
    animation:hugging 1s infinite alternate;
}

@keyframes hugging{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

.qr-section{
    margin-top:25px;
}

.qr-section img{
    width:160px;
    height:160px;
    margin-top:10px;
    border-radius:12px;
}

.small-text{
    margin-top:8px;
    color:#666;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div id="bear" class="bear">🐻💖</div>

<h1>Will You Be My Valentine?</h1>

<div class="buttons">
    <button id="yesBtn">Yes 💘</button>
    <button id="noBtn">No 😢</button>
</div>

<div id="message"></div>


</div>

</div>

<script>
const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');
const message = document.getElementById('message');
const bear = document.getElementById('bear');

noBtn.addEventListener('mouseover', () => {
    const x = Math.random() * 250;
    const y = Math.random() * 80;

    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
});

yesBtn.addEventListener('click', () => {
    bear.innerHTML = '🧸🤗🧸';
    bear.classList.add('hug');

    message.innerHTML = 'Yay! You are my Valentine ❤️';
});
</script>

</body>
</html>
